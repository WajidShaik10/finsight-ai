<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>FinSight AI</title>
  <link rel="icon" type="image/png" href="/static/favicon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #00ff88;
      --accent2: #0088ff;
      --text: #e0e0f0;
      --muted: #555570;
      --hover: #1a1a2e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; height: 100vh; height: 100dvh; display: flex; overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: transform 0.3s ease; flex-shrink: 0; z-index: 50; }
    .sidebar-header { padding: 16px 14px 12px; border-bottom: 1px solid var(--border); }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: var(--bg); flex-shrink: 0; }
    .sidebar-header h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
    .sidebar-header h1 span { color: var(--accent); }
    .new-chat-btn { width: 100%; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; padding: 10px; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; cursor: pointer; }
    .chat-list { flex: 1; overflow-y: auto; padding: 8px; }
    .chat-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background 0.2s; margin-bottom: 4px; gap: 8px; }
    .chat-item:hover, .chat-item:active { background: var(--hover); }
    .chat-item.active { background: var(--border); }
    .chat-item-info { flex: 1; overflow: hidden; }
    .chat-item-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item-doc { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .delete-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: 4px; flex-shrink: 0; }
    .delete-btn:hover { color: #ff4466; }

    /* ── MAIN ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── MOBILE TOPBAR ── */
    .mobile-topbar { display: none; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface); }
    .mobile-topbar .logo-row { display: flex; align-items: center; gap: 8px; }
    .mobile-topbar h1 { font-size: 16px; font-weight: 800; }
    .mobile-topbar h1 span { color: var(--accent); }
    .hamburger { background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; padding: 4px; }
    .mobile-new-btn { background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: 6px 12px; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; cursor: pointer; }

    /* ── MOBILE OVERLAY ── */
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 40; }
    .sidebar-overlay.show { display: block; }

    /* ── EMPTY STATE ── */
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 24px; overflow-y: auto; }
    .empty-logo { width: 72px; height: 72px; background: var(--accent); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 42px; font-weight: 800; color: var(--bg); flex-shrink: 0; }
    .empty-state h2 { font-size: 24px; font-weight: 800; text-align: center; }
    .empty-state h2 span { color: var(--accent); }
    .empty-state p { color: var(--muted); text-align: center; font-size: 13px; max-width: 340px; line-height: 1.6; }
    .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; max-width: 480px; }
    .quick-action-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; cursor: pointer; text-align: left; transition: border-color 0.2s; }
    .quick-action-btn:hover, .quick-action-btn:active { border-color: var(--accent); }
    .quick-action-btn .qa-icon { font-size: 18px; margin-bottom: 6px; }
    .quick-action-btn .qa-title { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
    .quick-action-btn .qa-desc { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
    .start-btn { background: var(--accent); color: var(--bg); border: none; border-radius: 10px; padding: 12px 24px; font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; cursor: pointer; }

    /* ── CHAT HEADER ── */
    .chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-shrink: 0; }
    .chat-header-info { flex: 1; overflow: hidden; }
    .chat-header-info h2 { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-header-info p { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-header-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .export-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 10px; cursor: pointer; white-space: nowrap; }
    .export-btn:hover { color: var(--accent); border-color: var(--accent); }
    .upload-label { cursor: pointer; color: var(--muted); font-size: 20px; padding: 4px; }
    .upload-label:hover { color: var(--accent); }
    .upload-label input { display: none; }

    /* ── MESSAGES ── */
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
    .message { display: flex; gap: 10px; animation: fadeIn 0.3s ease; max-width: 85%; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { align-self: flex-end; flex-direction: row-reverse; max-width: 80%; }
    .message.agent { align-self: flex-start; max-width: 90%; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .message.user .avatar { background: var(--accent2); }
    .message.agent .avatar { background: var(--accent); color: var(--bg); font-weight: 700; font-size: 12px; }
    .bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; word-break: break-word; }
    .message.user .bubble { background: var(--accent2); color: #fff; border-bottom-right-radius: 4px; }
    .message.agent .bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .message.agent .bubble.thinking { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 12px; }
    .bubble h1, .bubble h2, .bubble h3 { margin: 10px 0 4px; color: var(--accent); font-size: 14px; }
    .bubble p { margin: 6px 0; }
    .bubble ul, .bubble ol { margin: 6px 0 6px 18px; }
    .bubble li { margin: 4px 0; line-height: 1.5; }
    .bubble strong { color: var(--accent); }
    .bubble table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 12px; display: block; overflow-x: auto; }
    .bubble th { background: var(--border); padding: 6px 10px; text-align: left; font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); }
    .bubble td { padding: 6px 10px; border-bottom: 1px solid var(--border); font-size: 12px; }
    .bubble code { background: var(--border); padding: 2px 5px; border-radius: 4px; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); }
    .bubble blockquote { border-left: 3px solid var(--accent); padding-left: 10px; color: var(--muted); margin: 8px 0; }
    .chart-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-top: 8px; width: 100%; max-width: 100%; }
    .chart-title { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .suggested-questions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .suggested-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 6px 12px; font-size: 12px; cursor: pointer; color: var(--text); font-family: 'Syne', sans-serif; }
    .suggested-btn:hover, .suggested-btn:active { border-color: var(--accent); color: var(--accent); }

    /* ── INPUT ── */
    .input-area { padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .input-row { display: flex; gap: 8px; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 8px 8px 8px 14px; }
    .input-row:focus-within { border-color: var(--accent); }
    .input-row input { flex: 1; background: none; border: none; color: var(--text); font-family: 'Syne', sans-serif; font-size: 15px; outline: none; min-width: 0; }
    .input-row input::placeholder { color: var(--muted); }
    .send-btn { background: var(--accent); color: var(--bg); border: none; border-radius: 8px; padding: 8px 14px; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; cursor: pointer; flex-shrink: 0; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .input-hint { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 6px; text-align: center; }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: flex-end; justify-content: center; z-index: 100; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 24px 20px; width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 14px; max-height: 90vh; overflow-y: auto; }
    .modal h3 { font-size: 18px; font-weight: 800; }
    .modal input[type="text"], .modal select { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 15px; outline: none; width: 100%; }
    .modal input[type="text"]:focus, .modal select:focus { border-color: var(--accent); }
    .modal select option { background: var(--surface); }
    .modal-divider { text-align: center; color: var(--muted); font-size: 12px; font-family: 'Space Mono', monospace; }
    .modal-upload-label { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--bg); border: 1px dashed var(--border); border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--muted); }
    .modal-upload-label:hover { border-color: var(--accent); color: var(--accent); }
    .modal-upload-label input { display: none; }
    .modal-upload-status { font-size: 12px; font-family: 'Space Mono', monospace; color: var(--accent); display: none; }
    .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
    .cancel-btn { background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 12px; cursor: pointer; }
    .create-btn { background: var(--accent); border: none; border-radius: 8px; padding: 12px 20px; color: var(--bg); font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; cursor: pointer; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); width: 280px; z-index: 50; }
      .sidebar.open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,0.5); }
      .mobile-topbar { display: flex; }
      .main { width: 100%; }
      .message { max-width: 95%; }
      .message.user { max-width: 85%; }
      .quick-actions { grid-template-columns: 1fr 1fr; gap: 6px; }
      .quick-action-btn { padding: 10px 12px; }
      .quick-action-btn .qa-icon { font-size: 16px; }
      .quick-action-btn .qa-title { font-size: 12px; }
      .quick-action-btn .qa-desc { font-size: 10px; }
      .empty-state { padding: 16px; gap: 12px; }
      .empty-logo { width: 60px; height: 60px; font-size: 34px; }
      .empty-state h2 { font-size: 20px; }
      .messages { padding: 12px; gap: 12px; }
      .bubble { font-size: 14px; padding: 10px 12px; }
      .input-area { padding: 10px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
      .modal-overlay { align-items: flex-end; }
      .modal { border-radius: 16px 16px 0 0; max-height: 85vh; }
      .chat-header { padding: 10px 12px; }
      .export-btn { display: none; }
    }

    @media (max-width: 380px) {
      .quick-actions { grid-template-columns: 1fr; }
      .bubble { font-size: 13px; }
    }
  </style>
</head>
<body>

<!-- Mobile Sidebar Overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="logo-icon">F</div>
      <h1>FinSight <span>AI</span></h1>
    </div>
    <button class="new-chat-btn" onclick="showNewChatModal()">+ New Chat</button>
  </div>
  <div class="chat-list" id="chatList"></div>
</aside>

<main class="main" id="main">
  <!-- Mobile Top Bar -->
  <div class="mobile-topbar">
    <button class="hamburger" onclick="openSidebar()">☰</button>
    <div class="logo-row">
      <div class="logo-icon" style="width:28px;height:28px;font-size:15px;">F</div>
      <h1>FinSight <span>AI</span></h1>
    </div>
    <button class="mobile-new-btn" onclick="showNewChatModal()">+ New</button>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="empty-logo">F</div>
    <h2>FinSight <span>AI</span></h2>
    <p>Your AI-powered financial research assistant. Ask about stocks, run backtests, optimize portfolios.</p>
    <div class="quick-actions">
      <div class="quick-action-btn" onclick="startQuickChat('Stock Analysis', 'What is AAPL stock price today?')">
        <div class="qa-icon">📈</div>
        <div class="qa-title">Stock Price</div>
        <div class="qa-desc">Get live prices</div>
      </div>
      <div class="quick-action-btn" onclick="startQuickChat('Company Compare', 'Compare Apple and Microsoft financials')">
        <div class="qa-icon">⚖️</div>
        <div class="qa-title">Compare</div>
        <div class="qa-desc">Side by side</div>
      </div>
      <div class="quick-action-btn" onclick="startQuickChat('Portfolio', 'Optimize portfolio AAPL MSFT GOOGL')">
        <div class="qa-icon">🎯</div>
        <div class="qa-title">Optimize</div>
        <div class="qa-desc">Portfolio weights</div>
      </div>
      <div class="quick-action-btn" onclick="showNewChatModal()">
        <div class="qa-icon">📄</div>
        <div class="qa-title">Analyze Doc</div>
        <div class="qa-desc">Upload 10-K</div>
      </div>
    </div>
    <button class="start-btn" onclick="showNewChatModal()">+ Start New Chat</button>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>New Chat</h3>
    <input type="text" id="chatName" placeholder="Chat name e.g. Apple Analysis"/>
    <select id="docSelect">
      <option value="">Select existing document...</option>
    </select>
    <div class="modal-divider">— or upload new —</div>
    <label class="modal-upload-label">
      📤 Upload a document
      <input type="file" id="modalFileInput" accept=".pdf,.html" onchange="handleModalUpload(event)"/>
    </label>
    <div class="modal-upload-status" id="modalUploadStatus"></div>
    <div class="modal-buttons">
      <button class="cancel-btn" onclick="hideModal()">Cancel</button>
      <button class="create-btn" onclick="createChat()">Create</button>
    </div>
  </div>
</div>

<script>
  const API = "https://wshaik-finsight-ai.hf.space";
  let currentChatId = null;
  let chats = {};
  let chartCounter = 0;

  function openSidebar() {
    document.getElementById("sidebar").classList.add("open");
    document.getElementById("sidebarOverlay").classList.add("show");
  }

  function closeSidebar() {
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("sidebarOverlay").classList.remove("show");
  }

  function extractChartData(text) {
    const data = { labels: [], values: [] };
    const yearPattern = /\b(20\d{2})\b[^\d]*\$?([\d,]+\.?\d*)\s*(billion|million|B|M|K)?/gi;
    let match;
    while ((match = yearPattern.exec(text)) !== null) {
      const year = match[1];
      let value = parseFloat(match[2].replace(/,/g, ''));
      const unit = match[3]?.toLowerCase();
      if (unit === 'million' || unit === 'm') value = value / 1000;
      if (!data.labels.includes(year)) {
        data.labels.push(year);
        data.values.push(value);
      }
    }
    if (data.labels.length === 0) {
      const labelPattern = /([A-Za-z][A-Za-z\s&]+?):\s*\$?([\d,]+\.?\d*)\s*(billion|million|B|M)?/gi;
      while ((match = labelPattern.exec(text)) !== null) {
        const label = match[1].trim();
        const value = parseFloat(match[2].replace(/,/g, ''));
        if (label.length < 30 && value > 0) {
          data.labels.push(label);
          data.values.push(value);
        }
      }
    }
    return data.labels.length >= 2 ? data : null;
  }

  function renderChart(data, question) {
    const id = `chart-${chartCounter++}`;
    const title = question.length > 50 ? question.substring(0, 50) + "..." : question;
    const wrapper = document.createElement("div");
    wrapper.className = "chart-wrapper";
    wrapper.innerHTML = `<div class="chart-title">📊 ${title}</div><canvas id="${id}" height="200"></canvas>`;
    setTimeout(() => {
      const ctx = document.getElementById(id);
      if (!ctx) return;
      new Chart(ctx, {
        type: "bar",
        data: {
          labels: data.labels,
          datasets: [{
            label: "Value",
            data: data.values,
            backgroundColor: "#00ff8833",
            borderColor: "#00ff88",
            borderWidth: 2,
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: "#555570", font: { family: "Space Mono", size: 9 } }, grid: { color: "#1e1e2e" } },
            y: { ticks: { color: "#555570", font: { family: "Space Mono", size: 9 } }, grid: { color: "#1e1e2e" } }
          }
        }
      });
    }, 100);
    return wrapper;
  }

  function exportPDF() {
    const chat = chats[currentChatId];
    const messages = document.getElementById("messages");
    const content = document.createElement("div");
    content.style.cssText = "font-family: Arial, sans-serif; padding: 20px; color: #000; background: #fff;";
    content.innerHTML = `<h1 style="color:#000; margin-bottom:4px;">FinSight AI — ${chat.name}</h1><p style="color:#666; font-size:12px; margin-bottom:20px;">Exported: ${new Date().toLocaleDateString()}</p><hr style="margin-bottom:20px;"/>`;
    messages.querySelectorAll(".message").forEach(msg => {
      const isUser = msg.classList.contains("user");
      const bubble = msg.querySelector(".bubble");
      if (!bubble) return;
      const msgDiv = document.createElement("div");
      msgDiv.style.cssText = `margin-bottom:16px; padding:12px 16px; border-radius:8px; background:${isUser ? '#e8f4fd' : '#f5f5f5'}; border-left:3px solid ${isUser ? '#0088ff' : '#00aa55'};`;
      msgDiv.innerHTML = `<div style="font-size:11px; color:#666; margin-bottom:6px; font-weight:bold;">${isUser ? '👤 You' : '🤖 FinSight AI'}</div><div style="font-size:13px; line-height:1.6;">${bubble.innerText}</div>`;
      content.appendChild(msgDiv);
    });
    html2pdf().set({ margin: 10, filename: `FinSightAI_${chat.name.replace(/\s+/g, '_')}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } }).from(content).save();
  }

  async function loadDocuments() {
    try {
      const res = await fetch(`${API}/documents`);
      const data = await res.json();
      const select = document.getElementById("docSelect");
      select.innerHTML = '<option value="">Select existing document...</option>';
      data.documents.forEach(doc => {
        const opt = document.createElement("option");
        opt.value = doc;
        opt.textContent = doc;
        select.appendChild(opt);
      });
    } catch(e) { console.error(e); }
  }

  async function handleModalUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const status = document.getElementById("modalUploadStatus");
    status.style.display = "block";
    status.textContent = `⏳ Uploading ${file.name}...`;
    const formData = new FormData();
    formData.append("file", file);
    try {
      const res = await fetch(`${API}/upload`, {method: "POST", body: formData});
      const data = await res.json();
      if (data.filename) {
        status.textContent = `✅ ${file.name} ready!`;
        const select = document.getElementById("docSelect");
        const opt = document.createElement("option");
        opt.value = data.filename;
        opt.textContent = data.filename;
        select.appendChild(opt);
        select.value = data.filename;
      } else {
        status.textContent = `❌ Upload failed`;
      }
    } catch(e) {
      status.textContent = `❌ Upload failed`;
    }
  }

  async function loadChats() {
    try {
      const res = await fetch(`${API}/chats`);
      const data = await res.json();
      data.chats.forEach(chat => { chats[chat.id] = chat; });
      renderChatList();
    } catch(e) { console.error(e); }
  }

  function renderChatList() {
    const list = document.getElementById("chatList");
    const chatArray = Object.values(chats);
    if (chatArray.length === 0) {
      list.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--muted);font-family:Space Mono,monospace;">No chats yet</div>';
      return;
    }
    list.innerHTML = chatArray.map(chat => `
      <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" onclick="openChat('${chat.id}'); closeSidebar();">
        <div class="chat-item-info">
          <div class="chat-item-name">${chat.name}</div>
          <div class="chat-item-doc">${chat.document || 'No document'}</div>
        </div>
        <button class="delete-btn" onclick="deleteChat(event,'${chat.id}')">🗑</button>
      </div>
    `).join('');
  }

  function showNewChatModal() {
    loadDocuments();
    document.getElementById("modalUploadStatus").style.display = "none";
    document.getElementById("modalOverlay").classList.add("show");
    setTimeout(() => document.getElementById("chatName").focus(), 300);
  }

  function hideModal() {
    document.getElementById("modalOverlay").classList.remove("show");
    document.getElementById("chatName").value = "";
    document.getElementById("modalUploadStatus").style.display = "none";
  }

  async function createChat() {
    const name = document.getElementById("chatName").value.trim();
    const doc = document.getElementById("docSelect").value;
    if (!name) { alert("Please enter a chat name"); return; }
    try {
      const res = await fetch(`${API}/chats/create`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name, document: doc})
      });
      const data = await res.json();
      chats[data.chat_id] = {id: data.chat_id, name: data.name, document: doc};
      hideModal();
      renderChatList();
      openChat(data.chat_id);
      closeSidebar();
    } catch(e) {
      alert("Error creating chat. Please try again.");
    }
  }

  async function startQuickChat(name, firstQuestion) {
    try {
      const res = await fetch(`${API}/chats/create`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name, document: ""})
      });
      const data = await res.json();
      chats[data.chat_id] = {id: data.chat_id, name: data.name, document: ""};
      renderChatList();
      openChat(data.chat_id);
      closeSidebar();
      setTimeout(() => {
        document.getElementById("chatInput").value = firstQuestion;
        sendMessage();
      }, 300);
    } catch(e) { console.error(e); }
  }

  function openChat(chatId) {
    currentChatId = chatId;
    const chat = chats[chatId];
    renderChatList();
    const main = document.getElementById("main");
    main.innerHTML = `
      <div class="mobile-topbar">
        <button class="hamburger" onclick="openSidebar()">☰</button>
        <div class="logo-row">
          <div class="logo-icon" style="width:28px;height:28px;font-size:15px;">F</div>
          <h1 style="font-size:15px;font-weight:800;">FinSight <span style="color:var(--accent);">AI</span></h1>
        </div>
        <button class="mobile-new-btn" onclick="showNewChatModal()">+ New</button>
      </div>
      <div class="chat-header">
        <div class="chat-header-info">
          <h2>${chat.name}</h2>
          <p>${chat.document || 'Live market data + AI analysis'}</p>
        </div>
        <div class="chat-header-actions">
          <button class="export-btn" onclick="exportPDF()">📄 Export</button>
          <label class="upload-label" title="Upload document">
            📎
            <input type="file" accept=".pdf,.html" onchange="uploadFile(event)"/>
          </label>
        </div>
      </div>
      <div class="messages" id="messages">
        <div class="message agent">
          <div class="avatar">F</div>
          <div class="bubble">
            👋 Hi! I am <strong>FinSight AI</strong> — your financial analyst for <strong>${chat.name}</strong>.
            ${chat.document ? 'Document <strong>' + chat.document + '</strong> loaded.' : 'Ask me about stocks, financials, or upload a document.'}
            <div class="suggested-questions">
              <button class="suggested-btn" onclick="askSuggested('What is AAPL stock price?')">📈 AAPL</button>
              <button class="suggested-btn" onclick="askSuggested('Compare AAPL and MSFT')">⚖️ Compare</button>
              <button class="suggested-btn" onclick="askSuggested('Optimize portfolio AAPL MSFT GOOGL')">🎯 Optimize</button>
              <button class="suggested-btn" onclick="askSuggested('Monte Carlo simulation for TSLA 30 days')">🎲 Predict</button>
            </div>
          </div>
        </div>
      </div>
      <div class="input-area">
        <div class="input-row">
          <input type="text" id="chatInput" placeholder="Ask about stocks, financials..." onkeydown="if(event.key==='Enter') sendMessage()"/>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">SEND</button>
        </div>
        <div class="input-hint">Tap SEND or press Enter</div>
      </div>
    `;
  }

  function askSuggested(question) {
    document.getElementById("chatInput").value = question;
    sendMessage();
  }

  let lastQuestion = "";

  async function sendMessage() {
    const input = document.getElementById("chatInput");
    const question = input.value.trim();
    if (!question || !currentChatId) return;
    lastQuestion = question;
    input.value = "";
    input.blur();
    addMessage("user", question);
    const btn = document.getElementById("sendBtn");
    btn.disabled = true;
    const thinkingId = addThinking();
    try {
      const res = await fetch(`${API}/chats/message`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({chat_id: currentChatId, question})
      });
      const data = await res.json();
      removeThinking(thinkingId);
      addMessage("agent", data.answer || data.error, lastQuestion);
    } catch(e) {
      removeThinking(thinkingId);
      addMessage("agent", "❌ Error connecting to API. Please try again.");
    }
    btn.disabled = false;
  }

  function addMessage(role, text, question = "") {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `message ${role}`;
    const formattedText = role === 'agent' ? marked.parse(text) : text;
    div.innerHTML = `<div class="avatar">${role === 'user' ? '👤' : 'F'}</div><div class="bubble">${formattedText}</div>`;
    container.appendChild(div);
    if (role === 'agent' && question) {
      const chartData = extractChartData(text);
      if (chartData) {
        const chartEl = renderChart(chartData, question);
        container.appendChild(chartEl);
      }
    }
    container.scrollTop = container.scrollHeight;
  }

  function addThinking() {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    const id = "thinking-" + Date.now();
    div.id = id;
    div.className = "message agent";
    div.innerHTML = `<div class="avatar">F</div><div class="bubble thinking">⏳ Analyzing...</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return id;
  }

  function removeThinking(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  async function uploadFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    addMessage("agent", `⏳ Uploading ${file.name}...`);
    const formData = new FormData();
    formData.append("file", file);
    try {
      const res = await fetch(`${API}/chats/${currentChatId}/upload`, {method: "POST", body: formData});
      const data = await res.json();
      addMessage("agent", data.message ? `✅ ${data.message}` : `❌ ${data.error}`);
      if (data.filename && currentChatId) {
        chats[currentChatId].document = data.filename;
        renderChatList();
      }
    } catch(e) {
      addMessage("agent", "❌ Upload failed.");
    }
  }

  async function deleteChat(event, chatId) {
    event.stopPropagation();
    await fetch(`${API}/chats/${chatId}`, {method: "DELETE"});
    delete chats[chatId];
    if (currentChatId === chatId) {
      currentChatId = null;
      location.reload();
    }
    renderChatList();
  }

  loadChats();
</script>
</body>
</html>
