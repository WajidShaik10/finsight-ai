<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quant RAG Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #00ff88;
      --accent2: #0088ff;
      --text: #e0e0f0;
      --muted: #555570;
      --danger: #ff4466;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    header h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    header h1 span { color: var(--accent); }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--accent);
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Layout ── */
    .dashboard {
      display: grid;
      grid-template-columns: 240px 1fr 280px;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .doc-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
    }

    .doc-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      background: var(--border);
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      cursor: pointer;
      transition: background 0.2s;
      word-break: break-all;
    }

    .doc-item:hover { background: #1e1e3a; }
    .doc-icon { color: var(--accent); font-size: 14px; }

    /* ── Upload ── */
    .upload-area {
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      font-size: 12px;
      color: var(--muted);
    }

    .upload-area:hover { border-color: var(--accent); color: var(--accent); }
    .upload-area input { display: none; }

    /* ── Metrics ── */
    .metrics-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .metric-item {
      background: var(--border);
      border-radius: 6px;
      padding: 10px 12px;
    }

    .metric-label {
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      font-family: 'Space Mono', monospace;
    }

    /* ── Chat ── */
    .chat-area {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 80%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; }
    .message.agent { align-self: flex-start; }

    .message-label {
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .message.user .message-label { text-align: right; }

    .message-bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.user .message-bubble {
      background: var(--accent2);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.agent .message-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message.agent .message-bubble.thinking {
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
    }

    /* ── Chat Input ── */
    .chat-input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input:focus { border-color: var(--accent); }
    .chat-input::placeholder { color: var(--muted); }

    .send-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Right Panel ── */
    .right-panel {
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 16px;
      gap: 20px;
    }

    .panel-title {
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .chart-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .quick-questions {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .quick-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, color 0.2s;
      font-family: 'Syne', sans-serif;
    }

    .quick-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Upload status ── */
    .upload-status {
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      padding: 6px 0;
      color: var(--accent);
      display: none;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <h1>Quant <span>RAG</span> Dashboard</h1>
  <div class="status">
    <div class="status-dot"></div>
    API Connected
  </div>
</header>

<div class="dashboard">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Documents</div>
      <div class="doc-list" id="docList">
        <div style="font-size:12px; color: var(--muted); font-family: 'Space Mono', monospace;">Loading...</div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">Upload</div>
      <label class="upload-area">
        <input type="file" id="fileInput" accept=".pdf,.html"/>
        📤 Drop PDF or HTML here
      </label>
      <div class="upload-status" id="uploadStatus"></div>
    </div>

    <div class="sidebar-section" style="flex:1; overflow-y:auto;">
      <div class="sidebar-title">Key Metrics</div>
      <div class="metrics-list" id="metricsList">
        <div style="font-size:12px; color: var(--muted); font-family: 'Space Mono', monospace;">Ask a question to see metrics</div>
      </div>
    </div>
  </aside>

  <!-- ── Chat ── -->
  <main class="chat-area">
    <div class="chat-messages" id="chatMessages">
      <div class="message agent">
        <div class="message-label">Agent</div>
        <div class="message-bubble">
          👋 Welcome to your Quant RAG Dashboard! Ask me anything about your financial documents.
          <br/><br/>
          Try: <em>"What was Apple's total revenue in 2023?"</em>
        </div>
      </div>
    </div>
    <div class="chat-input-area">
      <input
        class="chat-input"
        id="chatInput"
        type="text"
        placeholder="Ask about your financial documents..."
        onkeydown="if(event.key==='Enter') sendMessage()"
      />
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">SEND</button>
    </div>
  </main>

  <!-- ── Right Panel ── -->
  <aside class="right-panel">
    <div>
      <div class="panel-title">Quick Questions</div>
      <div class="quick-questions">
        <button class="quick-btn" onclick="askQuick('What was the total revenue?')">💰 Total Revenue</button>
        <button class="quick-btn" onclick="askQuick('What was the net income?')">📈 Net Income</button>
        <button class="quick-btn" onclick="askQuick('What was the gross margin percentage?')">📊 Gross Margin</button>
        <button class="quick-btn" onclick="askQuick('What was the R&D expense?')">🔬 R&D Expense</button>
        <button class="quick-btn" onclick="askQuick('What are the main risk factors?')">⚠️ Risk Factors</button>
        <button class="quick-btn" onclick="askQuick('What are the main products?')">📦 Main Products</button>
      </div>
    </div>

    <div>
      <div class="panel-title">Revenue Chart</div>
      <div class="chart-container">
        <canvas id="revenueChart" height="180"></canvas>
      </div>
    </div>

    <div>
      <div class="panel-title">Income Chart</div>
      <div class="chart-container">
        <canvas id="incomeChart" height="180"></canvas>
      </div>
    </div>
  </aside>

</div>

<script>
  const API = "http://127.0.0.1:8000";

  // ── Load documents ──
  async function loadDocuments() {
    try {
      const res = await fetch(`${API}/documents`);
      const data = await res.json();
      const list = document.getElementById("docList");
      if (data.documents.length === 0) {
        list.innerHTML = '<div style="font-size:12px; color: var(--muted); font-family: Space Mono, monospace;">No documents yet</div>';
        return;
      }
      list.innerHTML = data.documents.map(doc => `
        <div class="doc-item">
          <span class="doc-icon">📄</span>
          <span>${doc}</span>
        </div>
      `).join('');
    } catch(e) {
      console.error(e);
    }
  }

  // ── Send message ──
  async function sendMessage() {
    const input = document.getElementById("chatInput");
    const question = input.value.trim();
    if (!question) return;

    input.value = "";
    addMessage("user", question);

    const btn = document.getElementById("sendBtn");
    btn.disabled = true;

    // Thinking indicator
    const thinkingId = addThinking();

    try {
      const res = await fetch(`${API}/chat`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({question})
      });
      const data = await res.json();
      removeThinking(thinkingId);
      addMessage("agent", data.answer || data.error);
      updateMetrics(question, data.answer);
    } catch(e) {
      removeThinking(thinkingId);
      addMessage("agent", "❌ Error connecting to API. Is the server running?");
    }

    btn.disabled = false;
  }

  // ── Quick question ──
  function askQuick(q) {
    document.getElementById("chatInput").value = q;
    sendMessage();
  }

  // ── Add message ──
  function addMessage(role, text) {
    const container = document.getElementById("chatMessages");
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="message-label">${role === 'user' ? 'You' : 'Agent'}</div>
      <div class="message-bubble">${text}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div.id;
  }

  // ── Thinking indicator ──
  function addThinking() {
    const container = document.getElementById("chatMessages");
    const div = document.createElement("div");
    const id = "thinking-" + Date.now();
    div.id = id;
    div.className = "message agent";
    div.innerHTML = `
      <div class="message-label">Agent</div>
      <div class="message-bubble thinking">⏳ Searching documents...</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return id;
  }

  function removeThinking(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  // ── Update metrics panel ──
  function updateMetrics(question, answer) {
    const keywords = {
      "revenue": "Total Revenue",
      "net income": "Net Income",
      "gross margin": "Gross Margin",
      "r&d": "R&D Expense",
      "earnings per share": "EPS"
    };

    for (const [key, label] of Object.entries(keywords)) {
      if (question.toLowerCase().includes(key)) {
        addMetric(label, answer.substring(0, 60) + "...");
      }
    }
  }

  function addMetric(label, value) {
    const list = document.getElementById("metricsList");
    const existing = list.querySelector(`[data-label="${label}"]`);
    if (existing) {
      existing.querySelector(".metric-value").textContent = value;
      return;
    }
    const div = document.createElement("div");
    div.className = "metric-item";
    div.dataset.label = label;
    div.innerHTML = `
      <div class="metric-label">${label}</div>
      <div class="metric-value">${value}</div>
    `;
    list.innerHTML = "";
    list.appendChild(div);
  }

  // ── File upload ──
  document.getElementById("fileInput").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const status = document.getElementById("uploadStatus");
    status.style.display = "block";
    status.textContent = `⏳ Uploading ${file.name}...`;

    const formData = new FormData();
    formData.append("file", file);

    try {
      const res = await fetch(`${API}/upload`, {
        method: "POST",
        body: formData
      });
      const data = await res.json();
      status.textContent = data.message || data.error;
      loadDocuments();
    } catch(e) {
      status.textContent = "❌ Upload failed";
    }
  });

  // ── Charts ──
  function initCharts() {
    const chartDefaults = {
      responsive: true,
      plugins: {
        legend: { labels: { color: "#555570", font: { family: "Space Mono", size: 10 } } }
      },
      scales: {
        x: { ticks: { color: "#555570", font: { family: "Space Mono", size: 10 } }, grid: { color: "#1e1e2e" } },
        y: { ticks: { color: "#555570", font: { family: "Space Mono", size: 10 } }, grid: { color: "#1e1e2e" } }
      }
    };

    new Chart(document.getElementById("revenueChart"), {
      type: "bar",
      data: {
        labels: ["2021", "2022", "2023"],
        datasets: [{
          label: "Revenue ($B)",
          data: [365.8, 394.3, 383.3],
          backgroundColor: "#00ff8833",
          borderColor: "#00ff88",
          borderWidth: 2,
          borderRadius: 4
        }]
      },
      options: { ...chartDefaults, backgroundColor: "transparent" }
    });

    new Chart(document.getElementById("incomeChart"), {
      type: "line",
      data: {
        labels: ["2021", "2022", "2023"],
        datasets: [{
          label: "Net Income ($B)",
          data: [94.7, 99.8, 97.0],
          borderColor: "#0088ff",
          backgroundColor: "#0088ff22",
          borderWidth: 2,
          tension: 0.4,
          fill: true,
          pointBackgroundColor: "#0088ff"
        }]
      },
      options: { ...chartDefaults }
    });
  }

  // ── Init ──
  loadDocuments();
  initCharts();
</script>

</body>
</html>
