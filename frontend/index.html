<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quant Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #00ff88;
      --accent2: #0088ff;
      --text: #e0e0f0;
      --muted: #555570;
      --hover: #1a1a2e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .sidebar-header h1 span { color: var(--accent); }

    .new-chat-btn {
      width: 100%;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .new-chat-btn:hover { opacity: 0.85; }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 4px;
      gap: 8px;
    }

    .chat-item:hover { background: var(--hover); }
    .chat-item.active { background: var(--border); }

    .chat-item-info { flex: 1; overflow: hidden; }

    .chat-item-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item-doc {
      font-size: 11px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s;
    }

    .chat-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #ff4466; }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }

    .old-dashboard-btn {
      width: 100%;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .old-dashboard-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Empty State ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px;
    }

    .empty-state h2 {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
    }

    .empty-state h2 span { color: var(--accent); }

    .empty-state p {
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      max-width: 400px;
      line-height: 1.6;
    }

    .start-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .start-btn:hover { opacity: 0.85; }

    /* ── Chat Header ── */
    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-header-info h2 {
      font-size: 16px;
      font-weight: 700;
    }

    .chat-header-info p {
      font-size: 12px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.3s ease;
      max-width: 80%;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.agent { align-self: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message.user .avatar { background: var(--accent2); }
    .message.agent .avatar { background: var(--accent); color: var(--bg); }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.user .bubble {
      background: var(--accent2);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.agent .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message.agent .bubble.thinking {
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
    }

    /* ── Input ── */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 8px 8px 16px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within { border-color: var(--accent); }

    .input-row input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      outline: none;
    }

    .input-row input::placeholder { color: var(--muted); }

    .upload-label {
      cursor: pointer;
      color: var(--muted);
      font-size: 18px;
      padding: 6px;
      border-radius: 6px;
      transition: color 0.2s;
    }

    .upload-label:hover { color: var(--accent); }
    .upload-label input { display: none; }

    .send-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .input-hint {
      font-size: 11px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      margin-top: 8px;
      text-align: center;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      display: none;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 420px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal h3 {
      font-size: 18px;
      font-weight: 800;
    }

    .modal input, .modal select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    .modal input:focus, .modal select:focus { border-color: var(--accent); }
    .modal select option { background: var(--surface); }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .cancel-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 20px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      cursor: pointer;
    }

    .create-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      color: var(--bg);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>Quant <span>Agent</span></h1>
    <button class="new-chat-btn" onclick="showNewChatModal()">+ New Chat</button>
  </div>
  <div class="chat-list" id="chatList"></div>
  <div class="sidebar-footer">
    <button class="old-dashboard-btn" onclick="window.location.href='/old'">📊 Analytics Dashboard</button>
  </div>
</aside>

<!-- ── Main ── -->
<main class="main" id="main">
  <div class="empty-state" id="emptyState">
    <h2>Quant <span>RAG</span> Agent</h2>
    <p>Upload any financial document — 10-K, research paper, or report — and ask questions in plain English.</p>
    <button class="start-btn" onclick="showNewChatModal()">+ Start New Chat</button>
  </div>
</main>

<!-- ── New Chat Modal ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>New Chat</h3>
    <input type="text" id="chatName" placeholder="Chat name e.g. Apple Analysis"/>
    <select id="docSelect">
      <option value="">Select a document...</option>
    </select>
    <div class="modal-buttons">
      <button class="cancel-btn" onclick="hideModal()">Cancel</button>
      <button class="create-btn" onclick="createChat()">Create Chat</button>
    </div>
  </div>
</div>

<script>
  const API = "http://127.0.0.1:8000";
  let currentChatId = null;
  let chats = {};

  // ── Load documents into select ──
  async function loadDocuments() {
    try {
      const res = await fetch(`${API}/documents`);
      const data = await res.json();
      const select = document.getElementById("docSelect");
      select.innerHTML = '<option value="">Select a document...</option>';
      data.documents.forEach(doc => {
        const opt = document.createElement("option");
        opt.value = doc;
        opt.textContent = doc;
        select.appendChild(opt);
      });
    } catch(e) { console.error(e); }
  }

  // ── Load chats ──
  async function loadChats() {
    try {
      const res = await fetch(`${API}/chats`);
      const data = await res.json();
      data.chats.forEach(chat => { chats[chat.id] = chat; });
      renderChatList();
    } catch(e) { console.error(e); }
  }

  // ── Render chat list ──
  function renderChatList() {
    const list = document.getElementById("chatList");
    const chatArray = Object.values(chats);
    if (chatArray.length === 0) {
      list.innerHTML = '<div style="padding: 12px; font-size: 12px; color: var(--muted); font-family: Space Mono, monospace;">No chats yet</div>';
      return;
    }
    list.innerHTML = chatArray.map(chat => `
      <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" onclick="openChat('${chat.id}')">
        <div class="chat-item-info">
          <div class="chat-item-name">${chat.name}</div>
          <div class="chat-item-doc">${chat.document || 'No document'}</div>
        </div>
        <button class="delete-btn" onclick="deleteChat(event, '${chat.id}')">🗑</button>
      </div>
    `).join('');
  }

  // ── Show modal ──
  function showNewChatModal() {
    loadDocuments();
    document.getElementById("modalOverlay").classList.add("show");
    document.getElementById("chatName").focus();
  }

  function hideModal() {
    document.getElementById("modalOverlay").classList.remove("show");
    document.getElementById("chatName").value = "";
  }

  // ── Create chat ──
  async function createChat() {
    const name = document.getElementById("chatName").value.trim();
    const doc = document.getElementById("docSelect").value;
    if (!name) { alert("Please enter a chat name"); return; }

    const res = await fetch(`${API}/chats/create`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({name, document: doc})
    });
    const data = await res.json();
    chats[data.chat_id] = {id: data.chat_id, name: data.name, document: doc};
    hideModal();
    renderChatList();
    openChat(data.chat_id);
  }

  // ── Open chat ──
  function openChat(chatId) {
    currentChatId = chatId;
    const chat = chats[chatId];
    renderChatList();

    const main = document.getElementById("main");
    main.innerHTML = `
      <div class="chat-header">
        <div class="chat-header-info">
          <h2>${chat.name}</h2>
          <p>${chat.document || 'No document selected'}</p>
        </div>
        <label class="upload-label" title="Upload document">
          📎
          <input type="file" accept=".pdf,.html" onchange="uploadFile(event)"/>
        </label>
      </div>
      <div class="messages" id="messages">
        <div class="message agent">
          <div class="avatar">Q</div>
          <div class="bubble">
            👋 Hi! I'm your Quant Agent for <strong>${chat.name}</strong>.
            ${chat.document ? `I have <strong>${chat.document}</strong> loaded. Ask me anything!` : 'Upload a document to get started.'}
          </div>
        </div>
      </div>
      <div class="input-area">
        <div class="input-row">
          <input
            type="text"
            id="chatInput"
            placeholder="Ask about your financial documents..."
            onkeydown="if(event.key==='Enter') sendMessage()"
          />
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">SEND</button>
        </div>
        <div class="input-hint">Press Enter to send</div>
      </div>
    `;
  }

  // ── Send message ──
  async function sendMessage() {
    const input = document.getElementById("chatInput");
    const question = input.value.trim();
    if (!question || !currentChatId) return;

    input.value = "";
    addMessage("user", question);

    const btn = document.getElementById("sendBtn");
    btn.disabled = true;
    const thinkingId = addThinking();

    try {
      const res = await fetch(`${API}/chats/message`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({chat_id: currentChatId, question})
      });
      const data = await res.json();
      removeThinking(thinkingId);
      addMessage("agent", data.answer || data.error);
    } catch(e) {
      removeThinking(thinkingId);
      addMessage("agent", "❌ Error connecting to API.");
    }
    btn.disabled = false;
  }

  // ── Add message ──
  function addMessage(role, text) {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === 'user' ? '👤' : 'Q'}</div>
      <div class="bubble">${text}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function addThinking() {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    const id = "thinking-" + Date.now();
    div.id = id;
    div.className = "message agent";
    div.innerHTML = `
      <div class="avatar">Q</div>
      <div class="bubble thinking">⏳ Searching documents...</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return id;
  }

  function removeThinking(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  // ── Upload file ──
  async function uploadFile(event) {
    const file = event.target.files[0];
    if (!file) return;

    addMessage("agent", `⏳ Uploading and ingesting ${file.name}...`);

    const formData = new FormData();
    formData.append("file", file);

    try {
      const res = await fetch(`${API}/upload`, {method: "POST", body: formData});
      const data = await res.json();
      addMessage("agent", data.message ? `✅ ${data.message}` : `❌ ${data.error}`);
      if (data.filename && currentChatId) {
        chats[currentChatId].document = data.filename;
        renderChatList();
      }
    } catch(e) {
      addMessage("agent", "❌ Upload failed.");
    }
  }

  // ── Delete chat ──
  async function deleteChat(event, chatId) {
    event.stopPropagation();
    await fetch(`${API}/chats/${chatId}`, {method: "DELETE"});
    delete chats[chatId];
    if (currentChatId === chatId) {
      currentChatId = null;
      document.getElementById("main").innerHTML = document.querySelector(".empty-state")?.outerHTML || '';
      location.reload();
    }
    renderChatList();
  }

  // ── Init ──
  loadChats();
</script>

</body>
</html>
